<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>jealousiiiworld</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">

</head>


<body>


<div id="world">


<header>

<h1>💙 jealousiiiworld 💙</h1>

<p>✦ welcome to my pixel world ✦</p>

</header>



<div class="tools">

<button onclick="uploadBackground()">
🌊 background
</button>


<button onclick="uploadSticker()">
🦆 sticker
</button>


<button onclick="saveWorld()">
💾 save
</button>


</div>




<div id="canvas">


<div id="diaryBox">


<div class="title">
📖 diary
</div>


<textarea id="diary"
placeholder="write your day here..."
></textarea>


</div>


</div>



<div class="pageControl">

<button onclick="prevPage()">
←
</button>


<span id="page">
Page 001
</span>


<button onclick="nextPage()">
→
</button>


</div>



</div>


<script src="script.js"></script>


</body>


</html>
